name: Build, Deploy, and Run Playwright Tests

on:
  push:
    branches:
      - develop
  workflow_dispatch:
    inputs:
      environment:
        description: "URL to run tests against"
        required: true
        default: https://my-site.com

jobs:
  deploy_and_test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build and Deploy Staging
        run: |
          echo "Building and deploying staging..."
          # Replace with your actual deploy commands

      - name: Trigger Automation Repo Workflow
        id: trigger
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.REPO_ACCESS_TOKEN }}
          script: |
            const owner = "djewsanchez";
            const repo = "pw-bp";
            const workflow_id = "playwright.yml"; // automation repo workflow file
            const ref = "main";

            // Trigger repository_dispatch
            await github.rest.actions.createWorkflowDispatch({
              owner,
              repo,
              workflow_id,
              ref,
              inputs: {
                environment: "${{ github.event.inputs.environment }}",
                sha: "${{ github.sha }}",
                repo: "${{ github.repository }}",
                owner: "${{ github.repository_owner }}"
              }
            });

            core.setOutput("sha", "${{ github.sha }}");

      - name: Wait for Automation Repo Workflow
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.REPO_ACCESS_TOKEN }}
          script: |
            const owner = "djewsanchez";
            const repo = "pw-bp";
            const workflow_id = "playwright.yml";
            const sha = "${{ steps.trigger.outputs.sha }}";

            console.log("Polling automation repo workflow...");

            let status = "queued";
            let conclusion = null;

            while(status !== "completed") {
              const runs = await github.rest.actions.listWorkflowRuns({
                owner,
                repo,
                workflow_id,
                per_page: 10
              });

              const run = runs.data.workflow_runs.find(r => r.event === "repository_dispatch" && r.head_sha === sha);

              if(run) {
                status = run.status;
                conclusion = run.conclusion;
              }

              if(status !== "completed") {
                console.log("Still running... waiting 10s");
                await new Promise(resolve => setTimeout(resolve, 10000));
              }
            }

            console.log(`Automation workflow completed with conclusion: ${conclusion}`);

            if(conclusion !== "success") {
              core.setFailed("Playwright automation workflow failed in automation repo");
            }

      - name: Done
        run: echo "Playwright automation workflow finished; status reflected in PR/commit checks."
