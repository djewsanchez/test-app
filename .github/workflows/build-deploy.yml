name: Build, Deploy, and Run Playwright Tests

on:
  push:
    branches: ["main", "develop"]
  workflow_dispatch:
    inputs:
      environment:
        description: "URL to run tests against"
        required: true
        default: https://my-site.com

jobs:
  deploy_and_test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build and Deploy Staging
        run: |
          echo "Deploying staging..."
          # deploy commands

      # Set environment safely for push + manual
      - name: Set Environment
        id: env
        run: |
          ENV=${{ github.event.inputs.environment || 'https://my-site.com' }}
          echo "ENVIRONMENT=$ENV" >> $GITHUB_ENV

      # Trigger automation repo workflow
      - name: Trigger Playwright Automation
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.REPO_ACCESS_TOKEN }}
          script: |
            const owner = "djewsanchez";
            const repo = "pw-bp";

            console.log("Triggering automation workflow...");

            await github.rest.actions.createWorkflowDispatch({
              owner,
              repo,
              workflow_id: "playwright.yml",
              ref: "main",
              inputs: {
                environment: process.env.ENVIRONMENT,
                commit_sha: "${{ github.sha }}"
              }
            });

      # Wait a bit so the workflow appears in API
      - name: Initial Wait
        run: sleep 20

      # Poll automation repo workflow
      - name: Wait for Automation Workflow
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.REPO_ACCESS_TOKEN }}
          script: |
            const owner = "djewsanchez";
            const repo = "pw-bp";

            console.log("Polling automation workflow status...");

            let completed = false;

            while (!completed) {

              const runs = await github.rest.actions.listWorkflowRuns({
                owner,
                repo,
                workflow_id: "playwright.yml",
                per_page: 5
              });

              const run = runs.data.workflow_runs.find(r =>
                r.event === "workflow_dispatch"
              );

              if (!run) {
                console.log("No run found yet...");
              } else {

                console.log(`Status: ${run.status}`);

                if (run.status === "completed") {

                  console.log(`Conclusion: ${run.conclusion}`);

                  if (run.conclusion !== "success") {
                    core.setFailed("Automation tests failed");
                  }

                  completed = true;
                }
              }

              if (!completed) {
                console.log("Waiting 15 seconds...");
                await new Promise(r => setTimeout(r, 15000));
              }
            }

      - name: Done
        run: echo "Automation workflow finished"
