name: Build, Deploy, and Run Playwright Tests
# Trigger manual commit
on:
  push:
    branches: ["main", "develop"]
  workflow_dispatch:
    inputs:
      environment:
        description: "URL to run tests against"
        required: true
        default: https://my-site.com

jobs:
  deploy_and_test:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout
      - uses: actions/checkout@v4

      # 2️⃣ Build and deploy staging
      - name: Build and Deploy Staging
        run: |
          echo "Deploying staging..."
          # Add your real deploy commands here

      # 3️⃣ Trigger Automation Repo Workflow
      - name: Trigger Playwright Automation
        id: trigger
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.REPO_ACCESS_TOKEN }}
          script: |
            const owner = "djewsanchez";
            const repo = "pw-bp";
            const workflow_id = "playwright.yml";
            const ref = "main";

            console.log("Triggering automation repo workflow...");
            await github.rest.actions.createWorkflowDispatch({
              owner,
              repo,
              workflow_id,
              ref,
              inputs: {
                environment: "${{ github.event.inputs.environment }}",
                commit_sha: "${{ github.sha }}",
                source_repo: "${{ github.repository }}",
                source_owner: "${{ github.repository_owner }}"
              }
            });

      # 4️⃣ Wait for Automation Repo Workflow Completion
      - name: Wait for Automation Workflow
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.REPO_ACCESS_TOKEN }}
          script: |
            const owner = "djewsanchez";
            const repo = "pw-bp";
            const workflow_id = "playwright.yml";
            const sha = "${{ github.sha }}";

            console.log("Polling automation repo workflow...");

            let status = "queued";
            let conclusion = null;

            while (status !== "completed") {
              const runs = await github.rest.actions.listWorkflowRuns({
                owner,
                repo,
                workflow_id,
                per_page: 10
              });

              const run = runs.data.workflow_runs.find(r =>
                r.event === "workflow_dispatch" && r.head_sha === sha
              );

              if (run) {
                status = run.status;
                conclusion = run.conclusion;
              }

              if (status !== "completed") {
                console.log("Still running... waiting 15s");
                await new Promise(resolve => setTimeout(resolve, 15000));
              }
            }

            console.log(`Automation workflow completed with conclusion: ${conclusion}`);

            if (conclusion !== "success") {
              core.setFailed("Playwright automation workflow failed in automation repo");
            }

      - name: Done
        run: echo "Playwright automation workflow finished; status reflected in PR/commit checks."
