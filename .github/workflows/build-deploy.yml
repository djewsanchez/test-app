name: My Service Build and Deploy
on:
  push:
    branches:
      - develop
  workflow_dispatch:
    inputs:
      environment:
        description: "URL to run tests against"
        required: true
        default: https://my-site.com
jobs:
  deploy_staging:
    name: Staging Deploy
    runs-on: ubuntu-latest
    # if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    steps:
      - name: Logging the Staging release
        run: echo "This run is the staging deployment"
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set URL to pass to Tests
        run: |
          echo "ENVIRONMENT=http://my-site.com" >> $GITHUB_ENV
      - name: Build and Deploy
        run: |
          echo "Build and Deploy"
      - name: Trigger and wait for automation repo workflow
        uses: convictional/trigger-workflow-and-wait@v1.6.5
        with:
          owner: djewsanchez
          repo: pw-bp
          github_token: ${{ secrets.REPO_ACCESS_TOKEN }}
          workflow_file_name: playwright.yml
          ref: main
          wait_interval: 15
          propagate_failure: true
          client_payload: '{"environment":"${{ github.event.inputs.environment }}","sha":"${{ github.sha }}"}'
